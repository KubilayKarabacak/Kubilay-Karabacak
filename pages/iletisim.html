<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - KutuDünyası</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="nav-logo">KutuDünyası</a>
        <ul class="nav-links">
            <li><a href="../index.html">Ana Sayfa</a></li>
            <li><a href="urunler.html">Ürünler</a></li>
            <li><a href="iletisim.html" class="aktif">İletişim</a></li>
            <li><a href="sepet.html">Sepet (<span id="sepet-sayisi">0</span>)</a></li>
        </ul>
        <button class="hamburger">&#9776;</button>
    </nav>

    <div class="sayfa-baslik">
        <h1>İletişim</h1>
    </div>

    <section>
        <div class="iletisim-wrapper">
            <form id="iletisim-formu">
                <label for="ad">Ad Soyad</label>
                <input type="text" id="ad" name="ad" placeholder="Adınızı girin">
                <span id="ad-hata" class="hata"></span>

                <label for="email">E-posta</label>
                <input type="email" id="email" name="email" placeholder="E-posta adresiniz">
                <span id="email-hata" class="hata"></span>

                <label for="konu">Konu</label>
                <select id="konu" name="konu">
                    <option value="">Seçiniz</option>
                    <option value="siparis">Sipariş Hakkında</option>
                    <option value="urun">Ürün Bilgisi</option>
                    <option value="diger">Diğer</option>
                </select>

                <label for="mesaj">Mesaj</label>
                <textarea id="mesaj" name="mesaj" placeholder="Mesajınızı yazın"></textarea>
                <span id="mesaj-hata" class="hata"></span>

                <button type="submit">Gönder</button>
            </form>
        </div>
    </section>

    <footer>
        <p>© 2026 KutuDünyası | Tüm hakları saklıdır.</p>
        <p>Tel: 0545 933 29 71 &nbsp;|&nbsp; iletisim@kutudünyasi.com</p>
    </footer>

    <script src="../scripts/myscript.js"></script>
</body>
</html>
